<style>
        .headline-lg { font-size: 2rem; line-height: 2.5rem; }
        .body-md { font-size: 1rem; line-height: 1.5rem; }
        .label-md { font-size: 0.875rem; line-height: 1.25rem; letter-spacing: 0.025em; font-weight: 500; }
        .display-lg { font-size: 3rem; line-height: 1; }
        
        /* Glassmorphism utility */
        .glass-panel {
            background: rgba(51, 51, 72, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        /* Sonar Animation */
        @keyframes sonar-pulse {
            0% { transform: scale(0.5); opacity: 0.08; }
            100% { transform: scale(2.5); opacity: 0; }
        }
        .sonar-wave {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 1px solid #FF4D2E;
            animation: sonar-pulse 4s linear infinite;
        }
        .sonar-wave:nth-child(2) {
            animation-delay: 1.33s;
        }
        .sonar-wave:nth-child(3) {
            animation-delay: 2.66s;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-surface text-on-surface font-body h-screen flex flex-col antialiased selection:bg-primary-container selection:text-on-primary-container overflow-hidden">
<!-- Top App Bar (From Shared Components JSON) -->

<button class="text-on-surface-variant opacity-60 font-label label-md uppercase tracking-widest hover:text-primary-container transition-colors active:scale-95 duration-200">
            Skip

</header>
<!-- Main Content Canvas -->

<!-- Illustration Container -->
<div class="w-full max-w-md aspect-square mb-12 relative flex items-center justify-center">
<!-- Sonar Background Animation -->
<div class="absolute inset-0 flex items-center justify-center z-0 pointer-events-none">
<div class="sonar-wave"></div>
<div class="sonar-wave"></div>
<div class="sonar-wave"></div>
</div>
<!-- Decorative background glow -->
<div class="absolute inset-0 bg-primary-container/10 rounded-full blur-[80px]"></div>
<!-- Map Illustration (Placeholder with descriptive alt) -->

<!-- Floating Elements to simulate the map UI -->
<div class="absolute inset-0 flex items-center justify-center z-20 pointer-events-none">
<!-- User Location -->
<div class="w-4 h-4 bg-tertiary rounded-full shadow-[0_0_15px_rgba(100,212,252,0.8)] border-2 border-surface"></div>
<!-- Gym Pins -->
<div class="absolute top-1/4 left-1/4 transform -translate-x-1/2 -translate-y-1/2">
<span class="material-symbols-outlined text-primary-container text-3xl drop-shadow-[0_0_10px_rgba(255,86,55,0.6)]" data-weight="fill" style="font-variation-settings: 'FILL' 1;">location_on</span>
</div>
<div class="absolute bottom-1/3 right-1/4 transform translate-x-1/2 translate-y-1/2">
<span class="material-symbols-outlined text-primary-container text-4xl drop-shadow-[0_0_10px_rgba(255,86,55,0.6)]" data-weight="fill" style="font-variation-settings: 'FILL' 1;">location_on</span>
</div>
<div class="absolute top-1/3 right-1/3 transform translate-x-1/2 -translate-y-1/2 opacity-60">
<span class="material-symbols-outlined text-primary-container text-2xl" data-weight="fill" style="font-variation-settings: 'FILL' 1;">location_on</span>
</div>
</div>
</div>
<!-- Typography Section -->
<div class="text-center max-w-lg mx-auto z-20">
<h1 class="font-headline headline-lg font-extrabold tracking-tight text-on-surface mb-4">
                Find gyms near you instantly.
            </h1>
<p class="font-body body-md text-on-surface-variant max-w-sm mx-auto">
                Discover hundreds of gyms, studios and fitness centres around you.
            </p>
