<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>FitHub - Onboarding</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700;800&amp;family=Manrope:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary": "#003544",
                        "surface-container": "#1e1e32",
                        "primary-fixed-dim": "#ffb4a5",
                        "secondary-fixed": "#ffdad3",
                        "on-surface-variant": "#e5beb6",
                        "surface-tint": "#ffb4a5",
                        "on-tertiary-fixed": "#001f29",
                        "inverse-primary": "#ba1b00",
                        "on-secondary": "#630f03",
                        "tertiary-fixed": "#baeaff",
                        "secondary-container": "#832616",
                        "outline": "#ac8982",
                        "surface-bright": "#37374d",
                        "surface": "#111125",
                        "inverse-on-surface": "#2f2e43",
                        "on-error": "#690005",
                        "outline-variant": "#5c403a",
                        "on-tertiary-fixed-variant": "#004d62",
                        "surface-container-high": "#28283d",
                        "on-background": "#e2e0fc",
                        "surface-container-low": "#1a1a2e",
                        "on-secondary-container": "#ff9a86",
                        "surface-variant": "#333348",
                        "secondary-fixed-dim": "#ffb4a5",
                        "primary-container": "#ff5637",
                        "inverse-surface": "#e2e0fc",
                        "tertiary-fixed-dim": "#64d4fc",
                        "surface-dim": "#111125",
                        "on-secondary-fixed-variant": "#832616",
                        "on-primary": "#650a00",
                        "tertiary": "#64d4fc",
                        "error": "#ffb4ab",
                        "on-tertiary-container": "#002e3c",
                        "on-error-container": "#ffdad6",
                        "surface-container-highest": "#333348",
                        "primary": "#ffb4a5",
                        "on-surface": "#e2e0fc",
                        "background": "#111125",
                        "on-primary-container": "#590800",
                        "surface-container-lowest": "#0c0c1f",
                        "primary-fixed": "#ffdad3",
                        "on-primary-fixed-variant": "#8e1300",
                        "on-primary-fixed": "#3f0400",
                        "on-secondary-fixed": "#3f0400",
                        "error-container": "#93000a",
                        "tertiary-container": "#0e9dc3",
                        "secondary": "#ffb4a5"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "fontFamily": {
                        "headline": ["Lexend", "sans-serif"],
                        "body": ["Manrope", "sans-serif"],
                        "label": ["Manrope", "sans-serif"]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
    @keyframes data-pulse {
        0%, 100% { transform: scale(0.9); opacity: 0.05; }
        50% { transform: scale(1.3); opacity: 0.1; }
    }
  </style>
</head>
<body class="bg-surface text-on-surface font-body h-screen w-full flex flex-col overflow-hidden selection:bg-primary-container selection:text-on-primary-container">
<!-- Main Content Area -->
<main class="flex-1 flex flex-col justify-center items-center px-8 pb-12 pt-16 relative z-0">
<!-- Illustration / Graphic -->
<div class="relative w-full max-w-sm aspect-square mb-12 flex justify-center items-center">
<!-- Ambient Glow -->
<div class="absolute inset-0 bg-primary-container opacity-10 blur-3xl rounded-full"></div>
<!-- Real-time Data Aura -->
<div class="absolute w-64 h-64 bg-[#FF4D2E] rounded-full blur-2xl pointer-events-none" style="animation: data-pulse 4s ease-in-out infinite;"></div>
<div class="absolute w-72 h-72 bg-[#FF4D2E] rounded-full blur-3xl pointer-events-none" style="animation: data-pulse 6s ease-in-out infinite 2s;"></div>
<div class="relative w-64 h-64 bg-surface-container rounded-full flex flex-col items-center justify-center p-8 shadow-[0_16px_32px_rgba(226,224,252,0.06)] border border-surface-variant">
<!-- SVG Gauge -->
<svg class="absolute inset-0 w-full h-full transform -rotate-90 p-4" viewbox="0 0 100 100">
<defs>
<lineargradient id="capacity-gradient" x1="0%" x2="100%" y1="0%" y2="0%">
<stop offset="0%" stop-color="#ff5637"></stop> <!-- primary-container -->
<stop offset="100%" stop-color="#ffb4a5"></stop> <!-- primary -->
</lineargradient>
<filter height="140%" id="glow" width="140%" x="-20%" y="-20%">
<fegaussianblur result="blur" stddeviation="4"></fegaussianblur>
<fecomposite in="SourceGraphic" in2="blur" operator="over"></fecomposite>
</filter>
</defs>
<!-- Track -->
<circle cx="50" cy="50" fill="transparent" r="44" stroke="#333348" stroke-width="6"></circle>
<!-- Progress (85%) -->
<circle cx="50" cy="50" fill="transparent" filter="url(#glow)" r="44" stroke="url(#capacity-gradient)" stroke-dasharray="276.46" stroke-dashoffset="41.47" stroke-linecap="round" stroke-width="6"></circle>
</svg>
<!-- Inner Text -->
<div class="relative z-10 flex flex-col items-center justify-center mt-2">
<span class="font-headline font-bold text-6xl text-on-surface tracking-tighter">85<span class="text-3xl text-on-surface-variant">%</span></span>
<span class="font-body text-sm text-primary uppercase tracking-widest font-semibold mt-1">Full</span>
</div>
<!-- Trend Indicator -->
<div class="absolute -bottom-4 left-1/2 -translate-x-1/2 w-max bg-surface-container-high border border-outline-variant rounded-full px-4 py-2 flex items-center gap-2 shadow-[0_8px_16px_rgba(0,0,0,0.4)]">
<span class="material-symbols-outlined text-primary-container text-base">trending_up</span>
<span class="font-body text-xs text-on-surface font-medium whitespace-nowrap">Spiking in 15 mins</span>
</div>
</div>
</div>
<!-- Typography -->
<div class="text-center w-full max-w-md space-y-4">
<h1 class="font-headline font-bold text-4xl leading-tight tracking-tight text-on-surface">
                Know before you go.
            </h1>
<p class="font-body text-lg text-on-surface-variant leading-relaxed px-4">
                See real-time crowd levels so you always get the best workout experience.
            </p>
</div>
</main>
<!-- Bottom Action Area -->
<footer class="w-full px-6 pb-10 pt-4 flex flex-col items-center gap-10 bg-surface z-10 relative">
<!-- Pagination Dots -->
<div class="flex flex-row items-center gap-3">
<div class="w-2.5 h-2.5 rounded-full bg-surface-variant transition-all duration-300"></div>
<div class="w-2.5 h-2.5 rounded-full bg-surface-variant transition-all duration-300"></div>
<div class="w-10 h-2.5 rounded-full bg-primary-container transition-all duration-300 shadow-[0_0_12px_rgba(255,86,55,0.4)]"></div>
</div>
<!-- Primary CTA -->
<button class="w-full max-w-md bg-primary-container text-on-primary-container font-headline font-bold py-4 px-8 rounded-md text-lg tracking-wide hover:bg-primary transition-colors active:scale-[0.98] duration-200">
            Get Started
        </button>
</footer>
</body></html>
