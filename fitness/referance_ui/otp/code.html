<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>FitHub - OTP Verification</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300..900&amp;family=Manrope:wght@300..800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-dim": "#101413",
                        "primary-container": "#5dcaa5",
                        "error-container": "#93000a",
                        "secondary-fixed": "#c2ecd9",
                        "outline": "#87948d",
                        "on-secondary-container": "#95beac",
                        "on-error": "#690005",
                        "secondary-fixed-dim": "#a6cfbd",
                        "secondary": "#a6cfbd",
                        "surface-container-lowest": "#0b0f0e",
                        "primary-fixed-dim": "#6edab4",
                        "primary": "#7ae6c0",
                        "surface": "#101413",
                        "inverse-surface": "#e0e3e1",
                        "background": "#101413",
                        "tertiary-container": "#ff9e86",
                        "surface-variant": "#323634",
                        "on-secondary": "#0f372a",
                        "surface-tint": "#6edab4",
                        "on-tertiary-fixed": "#3c0700",
                        "surface-bright": "#363a39",
                        "on-error-container": "#ffdad6",
                        "on-primary-container": "#00523e",
                        "on-primary": "#003829",
                        "surface-container-low": "#181c1b",
                        "secondary-container": "#284e40",
                        "tertiary-fixed": "#ffdad2",
                        "on-surface": "#e0e3e1",
                        "surface-container-highest": "#323634",
                        "on-tertiary-fixed-variant": "#773220",
                        "surface-container": "#1c201f",
                        "tertiary": "#ffc6b8",
                        "outline-variant": "#3d4944",
                        "surface-container-high": "#272b2a",
                        "primary-fixed": "#8af7cf",
                        "on-secondary-fixed": "#002117",
                        "on-primary-fixed-variant": "#00513d",
                        "on-secondary-fixed-variant": "#284e40",
                        "inverse-primary": "#006c52",
                        "on-tertiary": "#591c0d",
                        "error": "#ffb4ab",
                        "on-tertiary-container": "#783322",
                        "on-surface-variant": "#bdcac2",
                        "on-background": "#e0e3e1",
                        "on-primary-fixed": "#002117",
                        "tertiary-fixed-dim": "#ffb4a2",
                        "inverse-on-surface": "#2d3130"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {},
                    "fontFamily": {
                        "headline": [
                            "Lexend"
                        ],
                        "body": [
                            "Manrope"
                        ],
                        "label": [
                            "Manrope"
                        ]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined[data-weight="fill"] {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface-container-lowest text-on-surface font-body min-h-screen flex flex-col antialiased">
<!-- Top App Bar -->
<header class="flex items-center justify-between px-6 py-4 w-full text-on-surface">
<button aria-label="Go back" class="flex items-center justify-center p-2 rounded-full hover:bg-surface-container-high transition-colors -ml-2" type="button">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<!-- Headline is empty per JSON -->
<div class="flex-1"></div>
</header>
<!-- Main Content -->
<main class="flex-1 flex flex-col px-6 pt-8 pb-4">
<!-- Header Text -->
<div class="mb-10">
<h1 class="font-headline text-4xl font-bold tracking-tight text-on-surface mb-3">Verify your number</h1>
<p class="text-on-surface-variant text-base font-body leading-relaxed flex flex-wrap items-center gap-1">
                We've sent a 4-digit code to <br/>
<span class="text-on-surface font-medium mt-1">+91 98765 43210</span>
<button aria-label="Edit phone number" class="text-primary hover:text-primary-container transition-colors inline-flex mt-1 ml-1" type="button">
<span class="material-symbols-outlined text-[18px]" data-icon="edit">edit</span>
</button>
</p>
</div>
<!-- OTP Inputs -->
<div class="flex justify-between items-center gap-4 mb-8">
<input aria-label="Digit 1" class="w-16 h-20 text-center text-3xl font-headline font-medium bg-surface-container-high border-2 border-primary text-primary outline-none rounded-xl focus:border-primary focus:ring-0 shadow-[0_0_15px_rgba(122,230,192,0.15)] transition-all" inputmode="numeric" maxlength="1" type="text" value="4"/>
<input aria-label="Digit 2" class="w-16 h-20 text-center text-3xl font-headline font-medium bg-surface-container border-2 border-transparent text-on-surface outline-none rounded-xl focus:border-outline-variant focus:ring-0 transition-all" inputmode="numeric" maxlength="1" type="text"/>
<input aria-label="Digit 3" class="w-16 h-20 text-center text-3xl font-headline font-medium bg-surface-container border-2 border-transparent text-on-surface outline-none rounded-xl focus:border-outline-variant focus:ring-0 transition-all" inputmode="numeric" maxlength="1" type="text"/>
<input aria-label="Digit 4" class="w-16 h-20 text-center text-3xl font-headline font-medium bg-surface-container border-2 border-transparent text-on-surface outline-none rounded-xl focus:border-outline-variant focus:ring-0 transition-all" inputmode="numeric" maxlength="1" type="text"/>
</div>
<!-- Resend Action -->
<div class="text-center mb-12">
<p class="text-on-surface-variant font-body text-sm">
                Didn't receive the code? 
                <span class="text-on-surface font-medium ml-1">Resend in 00:24</span>
</p>
</div>
<!-- Spacer -->
<div class="flex-1"></div>
<!-- Primary Action Button -->
<button class="w-full py-4 px-6 rounded-xl bg-gradient-to-br from-primary to-primary-container text-on-primary-container font-headline font-bold text-lg tracking-wide hover:shadow-[0_0_20px_rgba(122,230,192,0.3)] transition-all duration-300 mb-8 active:scale-[0.98]" type="button">
            Verify &amp; Proceed
        </button>
</main>
<!-- Custom Keyboard (Simulated) -->
<div class="bg-surface-container-low rounded-t-3xl shadow-[0_-10px_40px_rgba(0,0,0,0.5)] border-t border-outline-variant/10 px-4 py-6 pb-10 w-full z-40 mt-auto">
<div class="grid grid-cols-3 gap-x-4 gap-y-6 max-w-sm mx-auto">
<!-- Row 1 -->
<button class="h-14 flex items-center justify-center text-2xl font-headline font-medium text-on-surface hover:bg-surface-container-high rounded-xl transition-colors tap-highlight-none">1</button>
<button class="h-14 flex items-center justify-center text-2xl font-headline font-medium text-on-surface hover:bg-surface-container-high rounded-xl transition-colors tap-highlight-none">2</button>
<button class="h-14 flex items-center justify-center text-2xl font-headline font-medium text-on-surface hover:bg-surface-container-high rounded-xl transition-colors tap-highlight-none">3</button>
<!-- Row 2 -->
<button class="h-14 flex items-center justify-center text-2xl font-headline font-medium text-on-surface hover:bg-surface-container-high rounded-xl transition-colors tap-highlight-none">4</button>
<button class="h-14 flex items-center justify-center text-2xl font-headline font-medium text-on-surface hover:bg-surface-container-high rounded-xl transition-colors tap-highlight-none">5</button>
<button class="h-14 flex items-center justify-center text-2xl font-headline font-medium text-on-surface hover:bg-surface-container-high rounded-xl transition-colors tap-highlight-none">6</button>
<!-- Row 3 -->
<button class="h-14 flex items-center justify-center text-2xl font-headline font-medium text-on-surface hover:bg-surface-container-high rounded-xl transition-colors tap-highlight-none">7</button>
<button class="h-14 flex items-center justify-center text-2xl font-headline font-medium text-on-surface hover:bg-surface-container-high rounded-xl transition-colors tap-highlight-none">8</button>
<button class="h-14 flex items-center justify-center text-2xl font-headline font-medium text-on-surface hover:bg-surface-container-high rounded-xl transition-colors tap-highlight-none">9</button>
<!-- Row 4 -->
<div class="h-14"></div> <!-- Empty space -->
<button class="h-14 flex items-center justify-center text-2xl font-headline font-medium text-on-surface hover:bg-surface-container-high rounded-xl transition-colors tap-highlight-none">0</button>
<button aria-label="Delete" class="h-14 flex items-center justify-center text-on-surface-variant hover:text-on-surface hover:bg-surface-container-high rounded-xl transition-colors tap-highlight-none">
<span class="material-symbols-outlined text-[28px]" data-icon="backspace">backspace</span>
</button>
</div>
</div>
</body></html>
